    <script type="application/ld+json">

      },
      "url": "https://djorssi-match.ci/"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "url": "https://djorssi-match.ci/",
      "description": "La première plateforme de recrutement par swipe en Côte d'Ivoire.",
      "potentialAction": {

        "query-input": "required name=search_term_string"

    }
